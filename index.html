<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Brown Merge MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone-shell">
      <section class="hero-panel" aria-label="게임 헤더">
        <div class="top-bar">
          <p class="eyebrow">Brown Merge</p>
          <div class="top-actions">
            <button id="guideButton" class="ghost-button ghost-button-secondary" type="button">게임 가이드</button>
            <button id="resetButton" class="ghost-button" type="button">처음부터</button>
          </div>
        </div>

        <div class="stage-badges">
          <div class="badge-card">
            <span class="label">최고 단계</span>
            <strong id="bestLevel">1단계</strong>
          </div>
          <div class="badge-card">
            <span class="label">화수분 충전</span>
            <strong id="chargeCount">사용 가능</strong>
          </div>
          <div class="badge-card">
            <span class="label">빈 칸</span>
            <strong id="emptyCount">0</strong>
          </div>
        </div>

        <div class="brown-stage" aria-label="브라운 무대">
          <span class="stage-cloud cloud-a" aria-hidden="true"></span>
          <span class="stage-cloud cloud-b" aria-hidden="true"></span>
          <span class="stage-grass" aria-hidden="true"></span>
          <div id="stageGarden" class="stage-garden" aria-hidden="true"></div>
          <div class="brown-character">
            <span class="brown-head" aria-hidden="true">
              <img src="assets/brown-head.svg" alt="" />
            </span>
            <span class="brown-body" aria-hidden="true"></span>
            <span class="brown-arm brown-arm-left" aria-hidden="true"></span>
            <span class="brown-arm brown-arm-right" aria-hidden="true"></span>
            <span class="brown-leg brown-leg-left" aria-hidden="true"></span>
            <span class="brown-leg brown-leg-right" aria-hidden="true"></span>
            <span class="brown-shadow"></span>
          </div>
          <div id="brownBubble" class="brown-bubble">브라운이 오늘도 열심히 머지할 준비를 마쳤어요.</div>
        </div>
      </section>

      <section class="game-panel" aria-label="게임 영역">
        <div class="score-row">
          <div>
            <span class="label">Moves</span>
            <strong id="moveCount">0</strong>
          </div>
          <div>
            <span class="label">Merges</span>
            <strong id="mergeCount">0</strong>
          </div>
          <div>
            <span class="label">Score</span>
            <strong id="scoreCount">0</strong>
          </div>
        </div>

        <div id="boardShell" class="board-shell">
          <div class="board-frame" aria-hidden="true"></div>
          <div id="board" class="board" role="grid" aria-label="머지 아이템 보드"></div>
        </div>

        <p id="statusText" class="status-text">아이템을 길게 눌러 옮기거나, 같은 단계 아이템 위에 드롭해서 머지하세요.</p>
      </section>
    </main>

    <div id="guideModal" class="guide-modal" hidden>
      <div id="guideBackdrop" class="guide-backdrop"></div>
      <div class="guide-dialog" role="dialog" aria-modal="true" aria-labelledby="guideTitle">
        <p id="guideTitle" class="guide-dialog-title">플레이 가이드</p>
        <p class="guide-dialog-copy">화수분은 보드 안에서 이동할 수 있고, 탭하면 주변 칸에 아이템이 1개 또는 2개 나옵니다.</p>
        <p class="guide-dialog-copy">아이템은 빈 칸으로 옮길 수 있고, 같은 단계 아이템 위에 드롭하면 상위 단계로 머지됩니다.</p>
        <button id="guideCloseButton" class="confirm-button" type="button">확인</button>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
