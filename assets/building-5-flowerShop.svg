  <circle cx="22" cy="104" r="4" fill="#ff4870"/>
  <circle cx="22" cy="104" r="2" fill="#ffbbcc"/>
  <rect x="44" y="88" width="26" height="24" rx="3" fill="#ffeaf4" stroke="#c06090" stroke-width="1.5"/>
  <circle cx="53" cy="97" r="4.5" fill="#ffaacc"/>
  <circle cx="63" cy="95" r="4" fill="#ff80b0"/>
  <circle cx="57" cy="104" r="4" fill="#ff6090"/>
  <!-- Door -->
  <rect x="30" y="114" width="20" height="24" rx="4" fill="#e890b0" stroke="#c06080" stroke-width="1.5"/>
  <circle cx="37.5" cy="128" r="2.5" fill="#ff6090"/>
