  <rect x="16" y="88" width="48" height="14" rx="2" fill="#c8a870" stroke="#9a7040" stroke-width="1"/>
  <text x="40" y="99" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5a3010" font-weight="bold">도서관</text>
