  <!-- Columns -->
  <rect x="14" y="64" width="8" height="74" rx="3" fill="#e8d8b0" stroke="#c0a870" stroke-width="1.5"/>
  <rect x="28" y="64" width="8" height="74" rx="3" fill="#e8d8b0" stroke="#c0a870" stroke-width="1.5"/>
  <rect x="44" y="64" width="8" height="74" rx="3" fill="#e8d8b0" stroke="#c0a870" stroke-width="1.5"/>
  <rect x="58" y="64" width="8" height="74" rx="3" fill="#e8d8b0" stroke="#c0a870" stroke-width="1.5"/>
  <!-- Column bases -->
  <rect x="12" y="132" width="12" height="6" rx="1" fill="#c0a870"/>
  <rect x="26" y="132" width="12" height="6" rx="1" fill="#c0a870"/>
  <rect x="42" y="132" width="12" height="6" rx="1" fill="#c0a870"/>
  <rect x="56" y="132" width="12" height="6" rx="1" fill="#c0a870"/>
  <!-- Door -->
