  <rect x="56" y="54" width="8" height="56" rx="4" fill="#c8a060" stroke="#9a7030" stroke-width="2"/>
  <path d="M 16 56 Q 40 30 64 56" fill="none" stroke="#c8a060" stroke-width="8" stroke-linecap="round"/>
  <path d="M 16 56 Q 40 30 64 56" fill="none" stroke="#9a7030" stroke-width="2" stroke-linecap="round"/>
  <!-- Gate top ball -->
