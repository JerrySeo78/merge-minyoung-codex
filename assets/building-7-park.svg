  <!-- Right tree -->
  <rect x="68" y="88" width="6" height="34" rx="3" fill="#8a6030" stroke="#6a4020" stroke-width="1.5"/>
  <ellipse cx="71" cy="78" rx="14" ry="18" fill="#5ab848" stroke="#3a8828" stroke-width="1.5"/>
