<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 140">
  <!-- Main wall -->
  <rect x="4" y="54" width="72" height="84" rx="4" fill="#fff3d7" stroke="#c07030" stroke-width="2"/>
  <!-- Roof -->
  <rect x="2" y="44" width="76" height="14" rx="3" fill="#f08f54" stroke="#c06734" stroke-width="2"/>
  <!-- Clock tower base -->
  <rect x="30" y="22" width="20" height="26" rx="3" fill="#f0c688" stroke="#c07030" stroke-width="2"/>
  <!-- Clock face -->
  <circle cx="40" cy="32" r="8" fill="white" stroke="#c07030" stroke-width="1.5"/>
  <line x1="40" y1="26" x2="40" y2="32" stroke="#5a3010" stroke-width="1.5"/>
  <line x1="40" y1="32" x2="44" y2="36" stroke="#5a3010" stroke-width="1.5"/>
  <!-- Windows row 1 -->
  <rect x="8" y="62" width="16" height="14" rx="2" fill="#c8e8f8" stroke="#c07030" stroke-width="1.5"/>
  <rect x="56" y="62" width="16" height="14" rx="2" fill="#c8e8f8" stroke="#c07030" stroke-width="1.5"/>
  <!-- Windows row 2 -->
  <rect x="8" y="82" width="16" height="14" rx="2" fill="#c8e8f8" stroke="#c07030" stroke-width="1.5"/>
  <rect x="56" y="82" width="16" height="14" rx="2" fill="#c8e8f8" stroke="#c07030" stroke-width="1.5"/>
  <!-- Middle windows -->
  <rect x="28" y="62" width="24" height="14" rx="2" fill="#c8e8f8" stroke="#c07030" stroke-width="1.5"/>
  <line x1="40" y1="62" x2="40" y2="76" stroke="#c07030" stroke-width="1"/>
  <!-- Door -->
  <rect x="28" y="100" width="24" height="38" rx="4" fill="#c88040" stroke="#9a5820" stroke-width="1.5"/>
  <path d="M 28 110 Q 40 102 52 110" fill="none" stroke="#9a5820" stroke-width="1.5"/>
  <!-- Sign -->
  <rect x="10" y="84" width="14" height="8" rx="2" fill="#f08f54"/>
  <text x="17" y="91" text-anchor="middle" font-family="sans-serif" font-size="5.5" fill="white" font-weight="bold">학교</text>
</svg>
